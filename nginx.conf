# Конфигурация nginx для проксирования API запросов к Node.js
# Этот файл должен быть размещен в корне проекта для Timeweb Cloud Apps

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/xml
        text/xml
        image/svg+xml;

    # Корневая директория для статических файлов
    root /app/dist;
    index index.html;

    # Канонические URL: .html → чистый путь (301)
    location = /index.html {
        return 301 /;
    }
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    # Проксирование всех API запросов к Node.js серверу
    # Порт = внутренний порт контейнера (Dockerfile: ENV PORT=3000, EXPOSE 3000).
    # Плейсхолдер ${PORT} не подходит для «голого» nginx -t без подстановки — ломает валидацию на деплое.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Внешний доступ к Strapi admin/assets через Node.js proxy (server.cjs -> 127.0.0.1:1337)
    location ~ ^/(admin|uploads|content-manager|content-type-builder|i18n|documentation)(/|$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check проксируется к Node.js
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Хешированные ассеты Vite — долгий кеш
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Старый превью-путь каталога (файл удалён из репозитория)
    location = /catalogue-new {
        return 301 /catalog;
    }
    location = /catalogue-new.html {
        return 301 /catalog;
    }

    # Статические файлы и HTML-страницы
    # $uri.html первым — иначе директория documents/ перехватывает /documents и добавляет trailing slash
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri.html $uri /index.html;
    }
}
