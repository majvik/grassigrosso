# Конфигурация nginx для проксирования API запросов к Node.js
# Этот файл должен быть размещен в корне проекта для Timeweb Cloud Apps

server {
    listen 80;
    server_name _;

    # Корневая директория для статических файлов
    root /app/dist;
    index index.html;

    # Канонические URL: .html → чистый путь (301)
    location = /index.html {
        return 301 /;
    }
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    # Проксирование всех API запросов к Node.js серверу
    location /api/ {
        proxy_pass http://localhost:${PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check проксируется к Node.js
    location = /health {
        proxy_pass http://localhost:${PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Хешированные ассеты Vite — долгий кеш
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Статические файлы и HTML-страницы
    # $uri.html первым — иначе директория documents/ перехватывает /documents и добавляет trailing slash
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri.html $uri /index.html;
    }
}
